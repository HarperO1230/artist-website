<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harper Oates | Official Website</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg1: #1a0826;
      --bg2: #2e0d3a;
      --purple: #8f3dff;
      --purple-light: #b67cff;
      --orange: #ff7a18;
      --orange-light: #ffb347;
      --text: #fff7fb;
      --muted: #e7d8f1;
      --card: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.16);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      --radius: 24px;
      --max: 1150px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Space Grotesk", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 122, 24, 0.30), transparent 30%),
        radial-gradient(circle at top right, rgba(143, 61, 255, 0.35), transparent 35%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      top: -100px;
      left: -100px;
      background: var(--orange);
    }

    body::after {
      bottom: -100px;
      right: -100px;
      background: var(--purple);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .wrap {
      width: min(92%, var(--max));
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(14px);
      background: rgba(16, 6, 28, 0.55);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      gap: 20px;
    }

    .logo {
      font-family: "Playfair Display", serif;
      font-size: 1.4rem;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, var(--orange-light), var(--purple-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--muted);
      font-size: 0.95rem;
      transition: 0.2s ease;
    }

    .nav-links a:hover {
      color: white;
    }

    .btn {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 999px;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      border: 1px solid transparent;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: linear-gradient(90deg, var(--orange), var(--purple));
      color: white;
      box-shadow: 0 10px 25px rgba(143, 61, 255, 0.28);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.14);
      color: white;
    }

    .hero {
      padding: 86px 0 56px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 32px;
      align-items: center;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      color: var(--orange-light);
      font-size: 0.85rem;
      margin-bottom: 18px;
      letter-spacing: 0.4px;
